<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLLY Post</title>
    
    <!-- Подтверждение домена для TikTok Developers -->
    <meta name="tiktok-developers-site-verification" content="Vr8r1YMiO490psCs9PIqCeFssNIy7bN8" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0a0a0a; color: #f3f4f6; font-family: ui-sans-serif, system-ui, sans-serif; }
        .hidden { display: none !important; }
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #0f0f0f; border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb { background: #333; border-radius: 8px; }
    </style>
</head>
<body class="min-h-screen selection:bg-white selection:text-black flex flex-col items-center py-12 px-4 relative overflow-x-hidden">

    <div id="login-bg-1" class="absolute top-1/4 left-1/4 w-96 h-96 bg-[#2a2a2a] rounded-full mix-blend-screen filter blur-[120px] opacity-30 pointer-events-none"></div>
    <div id="login-bg-2" class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-[#1a1a1a] rounded-full mix-blend-screen filter blur-[100px] opacity-40 pointer-events-none"></div>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="login-screen" class="z-10 w-full max-w-md bg-[#121212]/80 backdrop-blur-xl border border-[#222] p-10 rounded-3xl shadow-2xl text-center mt-12">
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 bg-[#1a1a1a] rounded-2xl flex items-center justify-center border border-[#333]">
                <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
            </div>
        </div>
        
        <h1 class="text-3xl tracking-widest font-light text-white uppercase mb-2">
            HOLLY <span class="font-bold">Post</span>
        </h1>
        <p class="text-gray-500 text-sm mb-10" id="login-subtitle">
            Войдите через TikTok, чтобы начать создавать магию.
        </p>

        <button id="login-btn" class="w-full py-4 rounded-xl flex items-center justify-center gap-3 font-medium bg-white text-black hover:bg-gray-200 active:scale-[0.98] transition-all duration-300">
            <i data-lucide="log-in" class="w-5 h-5"></i>
            <span id="login-btn-text">Авторизация TikTok</span>
        </button>
        
        <!-- Кнопка для отладки ссылки -->
        <button id="debug-btn" class="mt-4 text-xs text-gray-600 underline hover:text-gray-400">
            Показать ссылку для входа (Debug)
        </button>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ (Скрыто по умолчанию) -->
    <div id="app-screen" class="w-full max-w-md hidden relative z-10">
        <header class="mb-12 text-center w-full flex items-center justify-between">
            <h1 class="text-2xl tracking-widest font-light text-white uppercase flex items-center gap-2">
                <i data-lucide="sparkles" class="w-5 h-5 text-gray-400"></i>
                HOLLY <span class="font-bold">Post</span>
            </h1>
            <div class="text-xs bg-[#1a1a1a] text-emerald-400 px-3 py-1.5 rounded-full border border-[#333] flex items-center gap-2">
                <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div>
                Подключено
            </div>
        </header>

        <main class="bg-[#121212] border border-[#222] p-6 rounded-2xl shadow-2xl relative overflow-hidden">
            <div id="success-overlay" class="hidden absolute inset-0 bg-[#0a0a0a]/90 backdrop-blur-sm z-20 flex flex-col items-center justify-center transition-opacity duration-300">
                <i data-lucide="check-circle" class="w-16 h-16 text-emerald-400 mb-4"></i>
                <h2 class="text-xl font-medium text-white mb-2">Опубликовано!</h2>
                <p class="text-gray-400 text-center px-6">Ваш пост успешно отправлен в TikTok.</p>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-2 uppercase tracking-wider">Фотография</label>
                <div id="upload-zone" class="w-full h-64 border-2 border-dashed border-[#333] hover:border-white transition-colors rounded-xl flex flex-col items-center justify-center cursor-pointer bg-[#0f0f0f] group">
                    <i data-lucide="upload" class="w-8 h-8 text-gray-600 group-hover:text-white transition-colors mb-3"></i>
                    <span class="text-gray-500 group-hover:text-gray-300 transition-colors text-sm">Нажмите для загрузки</span>
                </div>
                <div id="image-preview-container" class="hidden relative w-full h-64 rounded-xl overflow-hidden group">
                    <img id="image-preview" src="" alt="Preview" class="w-full h-full object-cover"/>
                    <button id="remove-image-btn" class="absolute top-3 right-3 p-2 bg-black/60 hover:bg-black/90 rounded-full text-white transition-all backdrop-blur-sm">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <input type="file" id="file-input" accept="image/*" class="hidden"/>
            </div>

            <div id="music-section" class="mb-6 overflow-hidden transition-all duration-500 max-h-0 opacity-0">
                <div class="flex items-center gap-3 p-4 rounded-xl border border-[#222] bg-gradient-to-r from-[#111] to-[#0a0a0a]">
                    <div class="p-2 bg-[#222] rounded-full">
                        <i data-lucide="music" class="w-4 h-4 text-white"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Аудио трек (Авто)</p>
                        <div id="music-loading" class="flex items-center gap-2">
                            <i data-lucide="loader-2" class="w-3 h-3 text-gray-400 animate-spin"></i>
                            <p class="text-sm text-gray-400">Подбор трека...</p>
                        </div>
                        <p id="music-title" class="hidden text-sm text-white font-medium truncate"></p>
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-medium text-gray-400 mb-2 uppercase tracking-wider">Описание</label>
                <textarea id="caption-input" placeholder="Добавьте подпись и хэштеги..." class="w-full bg-[#0f0f0f] border border-[#333] rounded-xl p-4 text-white placeholder-gray-600 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-all resize-none h-28"></textarea>
            </div>

            <button id="publish-btn" disabled class="w-full py-4 rounded-xl flex items-center justify-center gap-2 font-medium transition-all duration-300 bg-[#1a1a1a] text-gray-600 cursor-not-allowed">
                <i data-lucide="send" id="publish-icon" class="w-5 h-5"></i>
                <i data-lucide="loader-2" id="publish-loader" class="w-5 h-5 animate-spin hidden"></i>
                <span id="publish-text">Опубликовать в TikTok</span>
            </button>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // КОНФИГУРАЦИЯ
        const TIKTOK_CLIENT_KEY = 'sbawg5qmua0zx9l7az'; // ОБНОВЛЕНО: Ваш новый Client Key
        const BACKEND_URL = window.location.origin;
        
        // ВАЖНО: Формируем Redirect URI жестко, всегда со слешем на конце
        const REDIRECT_URI = window.location.origin + '/'; 

        // ⚠️ ДЛЯ ТЕСТА: Оставляем ТОЛЬКО user.info.basic. 
        // Если вход сработает, значит TikTok блокировал нас из-за того, 
        // что продукт "Content Posting API" не добавлен в приложение в их панели.
        const SCOPES = 'user.info.basic'; 
        
        let accessToken = null;
        let currentImageData = null;
        let currentMusic = null;
        let isPublishing = false;

        const loginScreen = document.getElementById('login-screen');
        const loginBg1 = document.getElementById('login-bg-1');
        const loginBg2 = document.getElementById('login-bg-2');
        const appScreen = document.getElementById('app-screen');
        const loginBtn = document.getElementById('login-btn');
        const loginBtnText = document.getElementById('login-btn-text');
        const loginSubtitle = document.getElementById('login-subtitle');
        const debugBtn = document.getElementById('debug-btn');
        
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');
        const musicSection = document.getElementById('music-section');
        const musicLoading = document.getElementById('music-loading');
        const musicTitle = document.getElementById('music-title');
        const captionInput = document.getElementById('caption-input');
        const publishBtn = document.getElementById('publish-btn');
        const publishIcon = document.getElementById('publish-icon');
        const publishLoader = document.getElementById('publish-loader');
        const publishText = document.getElementById('publish-text');
        const successOverlay = document.getElementById('success-overlay');

        // Генерация ссылки
        function getAuthUrl() {
            const state = Math.random().toString(36).substring(2);
            return `https://www.tiktok.com/v2/auth/authorize/?client_key=${TIKTOK_CLIENT_KEY}&scope=${SCOPES}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&state=${state}`;
        }

        // Переход на страницу логина
        loginBtn.addEventListener('click', () => {
            window.location.href = getAuthUrl();
        });

        // Кнопка дебага - покажет точную ссылку, которую мы отправляем
        debugBtn.addEventListener('click', () => {
            alert("Скопируйте Redirect URI и вставьте его в настройки TikTok один в один:\n\n" + REDIRECT_URI);
            console.log("Full Auth URL:", getAuthUrl());
        });

        // Проверка возврата
        async function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error'); // Ловим ошибки от TikTok
            
            if (error) {
                loginSubtitle.innerText = 'TikTok отклонил запрос: ' + error;
                loginSubtitle.classList.add('text-red-400');
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            if (code) {
                window.history.replaceState({}, document.title, window.location.pathname);
                loginBtn.disabled = true;
                loginBtnText.innerText = 'Подключение...';
                loginBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span id="login-btn-text">Подключение...</span>';
                lucide.createIcons();

                try {
                    const response = await fetch(`${BACKEND_URL}/api/auth/tiktok`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
                    });
                    
                    const data = await response.json();
                    
                    if (data.access_token) {
                        accessToken = data.access_token;
                        showApp();
                    } else {
                        loginSubtitle.innerText = 'Ошибка: не удалось обменять код на токен.';
                        loginSubtitle.classList.add('text-red-400');
                        resetLoginBtn();
                    }
                } catch (error) {
                    console.error("Ошибка сети:", error);
                    loginSubtitle.innerText = 'Ошибка соединения с сервером.';
                    loginSubtitle.classList.add('text-red-400');
                    resetLoginBtn();
                }
            }
        }

        function resetLoginBtn() {
            loginBtn.disabled = false;
            loginBtn.innerHTML = `<i data-lucide="log-in" class="w-5 h-5"></i><span id="login-btn-text">Авторизация TikTok</span>`;
            lucide.createIcons();
        }

        function showApp() {
            loginScreen.classList.add('hidden');
            loginBg1.classList.add('hidden');
            loginBg2.classList.add('hidden');
            appScreen.classList.remove('hidden');
        }

        checkAuth();

        // ЛОГИКА ПРИЛОЖЕНИЯ
        uploadZone.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    currentImageData = reader.result;
                    imagePreview.src = currentImageData;
                    
                    uploadZone.classList.add('hidden');
                    imagePreviewContainer.classList.remove('hidden');
                    publishBtn.disabled = false;
                    publishBtn.className = "w-full py-4 rounded-xl flex items-center justify-center gap-2 font-medium transition-all duration-300 bg-white text-black hover:bg-gray-200 active:scale-[0.98]";
                    
                    musicSection.classList.remove('max-h-0', 'opacity-0');
                    musicSection.classList.add('max-h-24', 'opacity-100');
                    musicLoading.classList.remove('hidden');
                    musicTitle.classList.add('hidden');
                    currentMusic = null;

                    setTimeout(() => {
                        const mockTracks = [
                            "Chill Vibes - Lofi Hip Hop",
                            "Trending TikTok Sound 2026"
                        ];
                        currentMusic = mockTracks[Math.floor(Math.random() * mockTracks.length)];
                        musicLoading.classList.add('hidden');
                        musicTitle.innerText = currentMusic;
                        musicTitle.classList.remove('hidden');
                    }, 1200);
                };
                reader.readAsDataURL(file);
            }
        });

        removeImageBtn.addEventListener('click', () => {
            currentImageData = null;
            currentMusic = null;
            fileInput.value = '';
            imagePreviewContainer.classList.add('hidden');
            uploadZone.classList.remove('hidden');
            musicSection.classList.remove('max-h-24', 'opacity-100');
            musicSection.classList.add('max-h-0', 'opacity-0');
            publishBtn.disabled = true;
            publishBtn.className = "w-full py-4 rounded-xl flex items-center justify-center gap-2 font-medium transition-all duration-300 bg-[#1a1a1a] text-gray-600 cursor-not-allowed";
        });

        publishBtn.addEventListener('click', async () => {
            if (!currentImageData || isPublishing) return;
            isPublishing = true;
            publishBtn.disabled = true;
            publishIcon.classList.add('hidden');
            publishLoader.classList.remove('hidden');
            publishText.innerText = 'Публикация...';

            try {
                const response = await fetch(`${BACKEND_URL}/api/publish`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accessToken: accessToken, image: currentImageData, caption: captionInput.value, music: currentMusic })
                });

                if (!response.ok) throw new Error('Ошибка сервера');
                successOverlay.classList.remove('hidden');
                
                setTimeout(() => {
                    successOverlay.classList.add('hidden');
                    removeImageBtn.click();
                    captionInput.value = '';
                }, 3000);

            } catch (error) {
                console.error("Ошибка при публикации:", error);
                alert("Не удалось опубликовать пост.");
            } finally {
                isPublishing = false;
                publishBtn.disabled = false;
                publishIcon.classList.remove('hidden');
                publishLoader.classList.add('hidden');
                publishText.innerText = 'Опубликовать в TikTok';
            }
        });
    </script>
</body>
</html>
